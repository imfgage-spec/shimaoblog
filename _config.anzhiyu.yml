# === 即刻短文 /essay/ 页面配置 ===
# 这是一个专门用来发布日常、碎语、短文案的页面
# 在命令行输入 hexo new page essay 创建页面后，即可访问
essay:
  enable: true # 功能总开关
  # 页面顶部介绍文案 (支持HTML)
  description: >
    <div style="text-align: center; margin: 20px 0;">
      <p style="font-size: 16px; color: var(--anzhiyu-font-2);">这里是石猫的碎碎念，记录生活中的小确幸与突发奇想。</p>
    </div>
  
  # 发布时间展示格式
  date_format: MM-DD HH:mm
  
  # 评论功能 (默认关闭，短文通常不希望评论刷屏)
  comments:
    enable: false
  
  # 列表展示样式
  list:
    # 每行显示的列数 (移动端自动变为1列)
    column: 2
    # 卡片圆角
    radius: 12px
    # 卡片阴影 (false为关闭)
    shadow: var(--anzhiyu-shadow-main)
    # 背景色 (false为透明)
    bg_color: false
    
  # 发布编辑器设置 (hexo new essay "标题" 时的默认模板)
  editor:
    # 默认封面图 (可替换为你自己的CDN地址)
    default_cover: https://bu.dusays.com/2023/05/08/645907596997d.gif
    # 默认标签
    default_tags: [日常, 碎语]

